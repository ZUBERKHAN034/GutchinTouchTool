name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -scheme GutchinTouchTool \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO

      - name: Package
        run: |
          cd DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent GutchinTouchTool.app GutchinTouchTool.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GutchinTouchTool
          path: DerivedData/Build/Products/Release/GutchinTouchTool.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DerivedData/Build/Products/Release/GutchinTouchTool.zip
          generate_release_notes: true
