name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -scheme GutchinTouchTool \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO

      - name: Package
        run: |
          cd DerivedData/Build/Products/Release
          zip -r GutchinTouchTool.zip GutchinTouchTool.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GutchinTouchTool
          path: DerivedData/Build/Products/Release/GutchinTouchTool.zip
          compression-level: 0
