name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -scheme GutchinTouchTool \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO

      - name: Package
        run: |
          cd DerivedData/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent GutchinTouchTool.app GutchinTouchTool-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: DerivedData/Build/Products/Release/GutchinTouchTool-${{ github.ref_name }}.zip
          generate_release_notes: true
